<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA & iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CartCompass">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Compass pointing to the nearest halal food cart near you">

  <title>CartCompass</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Screen 1: Splash / Permission Gate ─────────────────────────────── -->
  <div id="splash" class="screen active">
    <div class="splash-inner">
      <div class="splash-icon" aria-hidden="true">🧭</div>
      <h1>CartCompass</h1>
      <p class="tagline">Find the nearest halal cart,<br>wherever you are</p>
      <button id="start-btn" class="btn btn-primary">Find Halal Carts</button>
      <p class="permission-note">Needs location &amp; motion access</p>
    </div>
  </div>

  <!-- ── Screen 2: Loading ───────────────────────────────────────────────── -->
  <div id="loading-screen" class="screen">
    <div class="loading-inner">
      <div class="spinner" aria-hidden="true"></div>
      <p id="loading-msg">Getting your location…</p>
    </div>
  </div>

  <!-- ── Screen 3: Compass ──────────────────────────────────────────────── -->
  <div id="compass-screen" class="screen">

    <header class="top-bar">
      <div class="top-left">
        <span class="city-badge" id="city-badge">NYC</span>
      </div>
      <h1 class="app-title">CartCompass</h1>
      <div class="top-right">
        <button id="refresh-btn" class="icon-btn" title="Refresh carts" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="compass-main">
      <!-- Compass ring + needle -->
      <div class="compass-wrap">
        <div class="compass-outer-ring">
          <!-- Tick marks (generated by JS) -->
          <canvas id="tick-canvas" aria-hidden="true"></canvas>

          <!-- Cardinal labels -->
          <div class="cardinal n" aria-hidden="true">N</div>
          <div class="cardinal e" aria-hidden="true">E</div>
          <div class="cardinal s" aria-hidden="true">S</div>
          <div class="cardinal w" aria-hidden="true">W</div>

          <!-- Compass needle -->
          <div class="needle-wrap" id="needle-wrap" aria-label="Compass needle">
            <svg class="needle-svg" viewBox="0 0 60 120"
                 xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <!-- North (gold) -->
              <polygon points="30,4 40,62 30,54 20,62" fill="#f5a623"/>
              <!-- South (muted) -->
              <polygon points="30,116 40,58 30,66 20,58" fill="#3a3a3a"/>
              <!-- Center -->
              <circle cx="30" cy="60" r="8" fill="#1a1a1a" stroke="#f5a623" stroke-width="2.5"/>
              <circle cx="30" cy="60" r="3" fill="#f5a623"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Cart info card -->
      <div class="cart-card" id="cart-card">
        <div class="cart-halal-badge">HALAL</div>
        <div class="cart-name" id="cart-name">Searching…</div>
        <div class="cart-meta-row">
          <span class="cart-distance" id="cart-distance"></span>
          <span class="cart-address" id="cart-address"></span>
        </div>
        <a id="directions-link" class="btn btn-sm btn-outline hidden"
           href="#" target="_blank" rel="noopener">
          Open in Maps ↗
        </a>
      </div>
    </main>

    <!-- Error banner (dismissable) -->
    <div class="error-banner hidden" id="error-banner" role="alert">
      <span id="error-text"></span>
      <button id="dismiss-error" aria-label="Dismiss">✕</button>
    </div>

    <footer class="bottom-bar">
      <p>
        Data: <a href="https://openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a>
        &amp; <a href="https://opendata.cityofnewyork.us" target="_blank" rel="noopener">NYC Open Data</a>
      </p>
      <p class="disclaimer">Permit &amp; crowd-sourced locations — not real-time</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
